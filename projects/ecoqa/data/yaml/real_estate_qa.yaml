table_name: real_estate
table_description: 中国房地产市场数据，月频，多地理层级，包含房价指数、新房销售面积、二手房销售面积、新开工面积、房地产投资额、房贷利率、空置率、去化周期、房价同比等指标
table_unique_signals:
- 房价指数
- 新房销售面积
- 二手房销售面积
- 住宅销售
- 新开工面积
- 房地产投资
- 房地产开发投资
- 按揭利率
- 房贷利率
- 住宅空置率
- 去化周期
- 房价同比
- 库存去化
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  - province
  row_count: 5880
  data_range:
    start_year: 2016
    end_year: 2025
