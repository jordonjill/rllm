table_name: interest_rates
table_description: 中国货币市场及债券市场利率数据，月频，仅国家层级，包含政策利率、LPR、逆回购利率、国债收益率、期限利差、实际利率等
table_unique_signals:
- 政策利率
- LPR
- 逆回购利率
- 国债收益率
- 利差
- 实际利率
- 货币市场
- 债券市场
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  row_count: 120
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年1月的1年期LPR贷款利率是多少？
  sql: |-
    SELECT lpr_1y_pct
    FROM interest_rates
    WHERE year = 2024 AND month = 1
  columns_used:
  - year
  - month
  - lpr_1y_pct
  answer_type: scalar
  answer_unit: '%'
