- id: 12
  question: 查询2022年服务类CPI年均同比涨幅超过2%的省级地区
  sql: |-
    SELECT c.geo_name
    FROM cpi_inflation c
    JOIN cpi_inflation p
    ON c.geo_name = p.geo_name AND c.geo_level = p.geo_level AND c.month = p.month AND c.year = p.year + 1
    WHERE c.geo_level = 'province' AND c.year = 2022
    GROUP BY c.geo_name
    HAVING AVG((c.services_cpi_idx - p.services_cpi_idx) * 100.0 / p.services_cpi_idx) > 2.0
    ORDER BY c.geo_name
  requires_calculator: false
  answer:
    items:
    - name: geo_name
      value: 吉林
    - name: geo_name
      value: 山东
    - name: geo_name
      value: 山西
    - name: geo_name
      value: 黑龙江
- id: 13
  question: 查询2021年能源CPI指数高于100且能源CPI同比涨幅为正的全国月份同比涨幅记录
  sql: |-
    SELECT c.year, c.month,
           ROUND(((c.energy_cpi_idx - p.energy_cpi_idx) * 100.0 / p.energy_cpi_idx), 3) AS yoy_change_pct
    FROM cpi_inflation c
    JOIN cpi_inflation p
    ON c.geo_level = p.geo_level AND c.month = p.month AND c.year = p.year + 1
    WHERE c.geo_level = 'national' AND c.year = 2021 AND c.energy_cpi_idx > 100.0
      AND ((c.energy_cpi_idx - p.energy_cpi_idx) * 100.0 / p.energy_cpi_idx) > 0
    ORDER BY c.year, c.month
  requires_calculator: false
  answer:
    items:
    - name: yoy_change_pct
      value: 0.882
      dims:
        year: 2021
        month: 1
    - name: yoy_change_pct
      value: 0.55
      dims:
        year: 2021
        month: 4
    - name: yoy_change_pct
      value: 2.331
      dims:
        year: 2021
        month: 5
    - name: yoy_change_pct
      value: 2.664
      dims:
        year: 2021
        month: 6
    - name: yoy_change_pct
      value: 6.141
      dims:
        year: 2021
        month: 7
    - name: yoy_change_pct
      value: 3.099
      dims:
