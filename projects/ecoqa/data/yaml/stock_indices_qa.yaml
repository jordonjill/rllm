table_name: stock_indices
table_description: 中国A股主要股票指数月度数据，包含上证综指、深证成指、沪深300、创业板指收盘价，以及波动率指数、市盈率、成交额、北向资金净流入
table_unique_signals:
- 上证综指
- 深证成指
- 沪深300
- 创业板指
- 市盈率
- 北向资金
- A股
- 股票指数
- 市场波动率指数
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  row_count: 120
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年1月的上证综指月末收盘价是多少？
  sql: "SELECT shanghai_comp_close AS value\nFROM stock_indices\nWHERE year = 2024 AND month = 1"
  columns_used:
  - year
  - month
  - shanghai_comp_close
  answer_type: scalar
  answer_unit: 点
  answer: 4010.336
  requires_calculator: false
