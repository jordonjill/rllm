table_name: employment_stats
table_description: 中国就业市场统计数据，月频，多地理层级，包含劳动力规模、就业人数、失业率、青年失业率、劳动参与率、平均月薪、新增城镇就业岗位等指标
table_unique_signals:
- 失业率
- 就业人数
- 劳动参与率
- 平均工资
- 青年失业率
- 新增城镇就业岗位
- 劳动力人口
- 就业市场
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  - province
  - city
  row_count: 5880
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年1月全国的失业率是多少？
  sql: 'SELECT unemployment_rate_pct

    FROM employment_stats

    WHERE year = 2024 AND month = 1 AND geo_level = ''national'''
  columns_used:
  - year
  - month
  - geo_level
  - unemployment_rate_pct
  answer_type: scalar
  answer: 5.501
  answer_unit: '%'
