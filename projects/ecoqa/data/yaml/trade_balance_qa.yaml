table_name: trade_balance
table_description: 中国对外贸易数据，月频，多地理层级，包含出口额、进口额、贸易差额（百万美元）、出口/进口同比增速、第一大出口品类、第一大进口品类、第一大出口目的地、第一大进口来源地
questions:
- id: 1
  question: 2024年1月全国层级的进出口贸易数据是多少？
  sql: |-
    SELECT exports_musd, imports_musd, trade_balance_musd
    FROM trade_balance
    WHERE year = 2024 AND month = 1 AND geo_level = 'national'
  requires_calculator: false
  answer_type: list
  answer:
  - exports_musd: 326324.56
    imports_musd: 265438.55
    trade_balance_musd: 60886.01
  answer_unit: 百万美元
