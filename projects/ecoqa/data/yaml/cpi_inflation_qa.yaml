table_name: cpi_inflation
table_description: 中国消费者价格指数（CPI）数据，按国家/大区/省份/城市分层，月频，包含总体CPI、食品CPI、能源CPI、核心CPI、服务CPI及同比环比变化率
table_unique_signals:
- CPI指数
- 物价指数
- 通货膨胀
- 消费者价格
- 食品CPI
- 能源CPI
- 核心CPI
- 服务CPI
- 同比涨幅
- 环比涨幅
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  - province
  - city
  row_count: 5880
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 查询2024年1月全国层级的CPI总体指数是多少？
  sql: 'SELECT overall_cpi_idx AS value

    FROM cpi_inflation

    WHERE year = 2024 AND month = 1 AND geo_level = ''national''

    LIMIT 1'
  columns_used:
  - year
  - month
  - geo_level
  - overall_cpi_idx
  answer_type: scalar
  answer_unit: 指数
  requires_calculator: false
  answer: 116.245
