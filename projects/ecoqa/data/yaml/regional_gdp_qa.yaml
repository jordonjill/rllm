table_name: regional_gdp
table_description: 中国分地区GDP年度核算数据，年频，多地理层级，包含GDP总量、增速、人均GDP、人口、GDP占全国比重、三次产业结构比重、工业增加值、服务业增加值
table_unique_signals:
- 地区生产总值
- 省级GDP
- 人均GDP
- 三次产业结构
- 工业增加值
- 服务业增加值
- 区域GDP
- 地区经济
- GDP占全国比重
schema_summary:
  time_frequency: annual
  geo_levels_available:
  - national
  - region
  - province
  - city
  row_count: 490
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年全国层级的地区生产总值GDP是多少亿元？
  sql: "SELECT gdp_100m_cny AS value\nFROM regional_gdp\nWHERE year = 2024 AND geo_level = 'national'\nLIMIT 1"
  columns_used:
  - year
  - geo_level
  - gdp_100m_cny
  answer_type: scalar
  answer_unit: 亿元
  answer: 1323000.0
  requires_calculator: false
