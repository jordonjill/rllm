table_name: gdp_expenditure
table_description: 中国GDP支出法核算数据，季频，多地理层级，包含名义GDP、实际GDP、消费、投资、政府支出、进出口、净出口、GDP同比、消费/投资/净出口贡献率及季节调整标识
questions:
- id: 1
  question: 查询2024年第1季度全国层级的名义GDP支出数据
  sql: |-
    SELECT nominal_gdp_100m_cny AS value
    FROM gdp_expenditure
    WHERE year = 2024 AND quarter = 1 AND geo_level = 'national'
  answer:
    items:
    - name: nominal_gdp_100m_cny
      value: 288801.17
  requires_calculator: false
- id: 2
  question: 查询华东地区2023年第4季度的消费支出和投资支出数据
