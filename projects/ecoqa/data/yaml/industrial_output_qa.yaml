table_name: industrial_output
table_description: 中国工业生产指数，月频，多地理层级，包含总体工业指数、制造业指数、采矿业指数、公用事业指数、高技术产业指数、装备制造指数、产能利用率、同比增速、环比增速（季调）
table_unique_signals:
- 工业总产出指数
- 制造业指数
- 采矿业指数
- 公用事业指数
- 高技术产业指数
- 装备制造业指数
- 产能利用率
- 工业同比增速
- 工业增加值
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  - province
  - city
  row_count: 5880
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年1月全国的工业总产出指数是多少？
  sql: 'SELECT total_index AS value

    FROM industrial_output

    WHERE year = 2024 AND month = 1 AND geo_level = ''national''

    LIMIT 1'
  columns_used:
  - year
  - month
  - geo_level
  - total_index
  answer_type: scalar
  answer_unit: 指数
  requires_calculator: false
  answer: 159.84
