table_name: money_supply
table_description: 中国货币供应量统计数据，月频，含国家/大区/省份层级，包含M0、M1、M2余额及同比增速、社会融资规模流量、贷款余额、法定存款准备金率等指标
questions:
- id: 1
  question: 2024年1月全国M2货币供应余额是多少？
  sql: |-
    SELECT m2_100m_cny AS value
    FROM money_supply
    WHERE year = 2024 AND month = 1 AND geo_level = 'national'
  answer:
    items:
    - name: value
      value: 3818555.67
  requires_calculator: false
