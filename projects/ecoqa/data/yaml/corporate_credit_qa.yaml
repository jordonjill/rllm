table_name: corporate_credit
table_description: 中国企业信用债券市场数据，按行业、地区和季度分类，包含投资级/高收益债券收益率、信用利差、违约率、新发行量、降级比率、不良贷款率等指标
table_unique_signals:
- 企业信用
- 债券
- 违约率
- 信用利差
- 评级
- 降级率
- 不良率
- 发行额
- 投资级债券
- 高收益债
- 信用债
schema_summary:
  time_frequency: quarterly
  geo_levels_available:
  - national
  - region
  - province
  row_count: 17160
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年第1季度全国科技行业的企业债券投资级收益率是多少？
  sql: 'SELECT inv_grade_yield_pct AS value

    FROM corporate_credit

    WHERE year = 2024 AND quarter = 1 AND geo_level = ''national'' AND sector = ''科技'''
  columns_used:
  - year
  - quarter
  - geo_level
  - sector
  - inv_grade_yield_pct
  answer_type: scalar
  answer_unit: '%'
  answer: 3.858
  requires_calculator: false
