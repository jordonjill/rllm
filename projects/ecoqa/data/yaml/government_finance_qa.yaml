table_name: government_finance
table_description: 中国政府财政收支数据，年频，含国家/大区/省份层级，包含税收收入、非税收入、总收入、支出、赤字、债务余额、债务率、财政平衡、转移支付、社会保障支出等
table_unique_signals:
- 税收收入
- 非税收入
- 财政总收入
- 财政支出
- 财政赤字
- 政府债务余额
- 债务率
- 债务占GDP比率
- 财政平衡
- 转移支付
- 社会保障支出
schema_summary:
  time_frequency: annual
  geo_levels_available:
  - national
  - region
  - province
  row_count: 390
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年全国财政总收入是多少？
  sql: 'SELECT total_revenue_100m_cny AS value

    FROM government_finance

    WHERE year = 2024 AND geo_level = ''national'''
  columns_used:
  - year
  - geo_level
  - total_revenue_100m_cny
  answer_type: scalar
  answer_unit: 亿元
  requires_calculator: false
  answer: 257600.0
