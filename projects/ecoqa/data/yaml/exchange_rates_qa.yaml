table_name: exchange_rates
table_description: 中国外汇市场数据，月频，仅国家层级，包含主要货币对人民币汇率、CFETS指数、美元指数、外汇储备、汇率波动率等
table_unique_signals:
- 美元兑人民币汇率
- 欧元兑人民币汇率
- CFETS人民币汇率指数
- 外汇储备
- 汇率波动率
- 美元指数DXY
- 日元兑人民币
- 英镑兑人民币
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  row_count: 120
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 查询2024年1月的美元兑人民币汇率是多少？
  sql: "SELECT usd_cny\nFROM exchange_rates\nWHERE year = 2024 AND month = 1 AND geo_level = 'national'"
  columns_used:
  - year
  - month
  - geo_level
  - usd_cny
  answer_type: scalar
  answer: 6.9641
  answer_unit: CNY/USD
