table_name: energy_prices
table_description: 中国及国际能源价格数据，月频，含国家和大区层级，包含煤炭价格、LNG价格、WTI/布伦特原油价格、电价、碳价、可再生能源发电占比、总发电量等指标
table_unique_signals:
- 煤炭价格
- LNG价格
- WTI原油价格
- 布伦特原油价格
- 电价
- 碳价
- 可再生能源发电占比
- 总发电量
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  row_count: 960
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  question: 2020年1月全国的煤炭价格是多少元每吨？
  sql: |-
    SELECT coal_price_cny_per_ton AS value
    FROM energy_prices
    WHERE year = 2020 AND month = 1 AND geo_level = 'national'
  answer:
    items:
    - name: coal_price_cny_per_ton
      value: 739.371
  requires_calculator: false
