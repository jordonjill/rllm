table_name: corporate_credit
table_description: 中国企业信用债券市场数据，按行业、地区和季度分类，包含投资级/高收益债券收益率、信用利差、违约率、新发行量、降级比率、不良贷款率等指标
questions:
- id: 1
  question: 2024年第1季度全国科技行业的企业债券投资级收益率是多少？
  sql: |-
    SELECT inv_grade_yield_pct AS value 
    FROM corporate_credit 
    WHERE year = 2024 AND quarter = 1 AND geo_level = 'national' AND sector = '科技'
  answer_type: scalar
  answer_unit: '%'
  answer: 3.858
  requires_calculator: false
- id: 2
  question: 华北地区2023年第3季度金融行业的企业债券违约率是多少？
  sql: |-
    SELECT default_rate_pct AS value 
    FROM corporate_credit 
    WHERE year = 2023 AND quarter = 3 AND geo_name = '华北' AND sector = '金融'
  answer_type: scalar
  answer_unit: '%'
  answer: 1.025
  requires_calculator: false
- id: 3
  question: 查询2022年第4季度全国能源行业的投资级信用利差和高收益信用利差
  sql: |-
    SELECT ig_spread_bps, hy_spread_bps 
    FROM corporate_credit 
    WHERE year = 2022 AND quarter = 4 AND geo_level = 'national' AND sector = '能源'
  answer_type: list
  answer_unit: 基点
  answer:
  - ig_spread_bps: 134
    hy_spread_bps: 434
  requires_calculator: false
