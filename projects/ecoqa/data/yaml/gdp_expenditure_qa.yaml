table_name: gdp_expenditure
table_description: 中国GDP支出法核算数据，季频，多地理层级，包含名义GDP、实际GDP、消费、投资、政府支出、进出口、净出口、GDP同比、消费/投资/净出口贡献率及季节调整标识
table_unique_signals:
- GDP支出法
- 消费支出
- 投资支出
- 固定资本形成
- 净出口
- GDP同比增速
- 消费贡献率
- 投资拉动
- 名义GDP
- 实际GDP
schema_summary:
  time_frequency: quarterly
  geo_levels_available:
  - national
  - region
  - province
  - city
  row_count: 1960
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 查询2024年第1季度全国层级的名义GDP支出数据
  sql: "SELECT year, quarter, geo_level, nominal_gdp_100m_cny\nFROM gdp_expenditure\nWHERE year = 2024 AND quarter = 1 AND geo_level = 'national'\nLIMIT 10"
  columns_used:
  - year
  - quarter
  - geo_level
  - nominal_gdp_100m_cny
  answer_type: list
  answer:
  - year: 2024
    quarter: 1
    geo_level: national
    nominal_gdp_100m_cny: 288801.17
  answer_unit: 亿元
