table_name: corporate_credit
table_description: 中国企业信用债券市场数据，按行业、地区和季度分类，包含投资级/高收益债券收益率、信用利差、违约率、新发行量、降级比率、不良贷款率等指标
questions:
- id: 1
  question: 2024年第1季度全国科技行业的企业债券投资级收益率是多少？
  sql: |-
    SELECT inv_grade_yield_pct AS value 
    FROM corporate_credit 
    WHERE year = 2024 AND quarter = 1 AND geo_level = 'national' AND sector = '科技'
  answer:
    items:
    - name: inv_grade_yield_pct
      value: 3.858
  requires_calculator: false
- id: 2
