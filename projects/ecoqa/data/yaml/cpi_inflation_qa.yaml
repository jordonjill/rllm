- id: 12
  question: 查询2022年服务类CPI年均同比涨幅超过2%的省级地区
  sql: |-
    SELECT c.geo_name
    FROM cpi_inflation c
    JOIN cpi_inflation p
    ON c.geo_name = p.geo_name AND c.geo_level = p.geo_level AND c.month = p.month AND c.year = p.year + 1
    WHERE c.geo_level = 'province' AND c.year = 2022
    GROUP BY c.geo_name
    HAVING AVG((c.services_cpi_idx - p.services_cpi_idx) * 100.0 / p.services_cpi_idx) > 2.0
    ORDER BY c.geo_name
  answer_type: list
  answer_unit: null
  requires_calculator: false
  answer:
  - geo_name: 吉林
  - geo_name: 山东
  - geo_name: 山西
  - geo_name: 黑龙江
- id: 13
  question: 查询2020年到2023年间能源CPI指数高于100且能源CPI同比涨幅为正的全国月份记录
  sql: |-
    SELECT c.year, c.month, c.energy_cpi_idx,
           ROUND(((c.energy_cpi_idx - p.energy_cpi_idx) * 100.0 / p.energy_cpi_idx), 3) AS yoy_change_pct
    FROM cpi_inflation c
    JOIN cpi_inflation p
    ON c.geo_level = p.geo_level AND c.month = p.month AND c.year = p.year + 1
    WHERE c.geo_level = 'national' AND c.year BETWEEN 2020 AND 2023 AND c.energy_cpi_idx > 100.0
      AND ((c.energy_cpi_idx - p.energy_cpi_idx) * 100.0 / p.energy_cpi_idx) > 0
    ORDER BY c.year, c.month
