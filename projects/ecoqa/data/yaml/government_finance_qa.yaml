table_name: government_finance
table_description: 中国政府财政收支数据，年频，含国家/大区/省份层级，包含税收收入、非税收入、总收入、支出、赤字、债务余额、债务率、财政平衡、转移支付、社会保障支出等
questions:
- id: 1
  question: 2024年全国财政总收入是多少？
  sql: |-
    SELECT total_revenue_100m_cny AS value
    FROM government_finance
    WHERE year = 2024 AND geo_level = 'national'
  answer:
    items:
    - name: value
      value: 257600.0
  requires_calculator: false
