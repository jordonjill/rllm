table_name: retail_sales
table_description: 中国社会消费品零售数据，月频，多地理层级，包含社零总额、汽车销售额、食品销售额、网络零售额、服务零售额、名义同比增速、季调环比增速、实际同比增速
table_unique_signals:
- 社会消费品零售
- 社零总额
- 汽车类零售
- 网络零售额
- 服务零售额
- 季调环比增速
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  - province
  - city
  row_count: 5880
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年1月全国社会消费品零售总额是多少亿元？
  sql: 'SELECT total_sales_100m_cny AS value

    FROM retail_sales

    WHERE year = 2024 AND month = 1 AND geo_level = ''national''

    LIMIT 1'
  columns_used:
  - year
  - month
  - geo_level
  - total_sales_100m_cny
  answer_type: scalar
  answer: 71807.11
  answer_unit: 亿元
  requires_calculator: false
