table_name: money_supply
table_description: 中国货币供应量统计数据，月频，含国家/大区/省份层级，包含M0、M1、M2余额及同比增速、社会融资规模流量、贷款余额、法定存款准备金率等指标
table_unique_signals:
- M0流通中货币
- M1狭义货币
- M2广义货币
- 社会融资规模
- 法定存款准备金率
- 货币供应
- 货币余额
- 货币同比增速
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  - province
  row_count: 4680
  data_range:
    start_year: 2016
    end_year: 2025
