table_name: regional_gdp
table_description: 中国分地区GDP年度核算数据，年频，多地理层级，包含GDP总量、增速、人均GDP、人口、GDP占全国比重、三次产业结构比重、工业增加值、服务业增加值
questions:
- id: 1
  question: 2024年全国层级的地区生产总值GDP是多少亿元？
  sql: |-
    SELECT gdp_100m_cny AS value
    FROM regional_gdp
    WHERE year = 2024 AND geo_level = 'national'
  answer:
    items:
    - name: value
      value: 1323000.0
  requires_calculator: false
- id: 2
  question: 2023年广东省的人均GDP是多少元？
  sql: |-
    SELECT gdp_per_capita_cny AS value
    FROM regional_gdp
    WHERE year = 2023 AND geo_name = '广东'
  answer:
    items:
    - name: value
      value: 88038.06
  requires_calculator: false
- id: 3
