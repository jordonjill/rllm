table_name: trade_balance
table_description: 中国对外贸易数据，月频，多地理层级，包含出口额、进口额、贸易差额（百万美元）、出口/进口同比增速、第一大出口品类、第一大进口品类、第一大出口目的地、第一大进口来源地
table_unique_signals:
- 进出口
- 贸易顺差
- 贸易逆差
- 贸易差额
- 出口额
- 进口额
- 出口同比
- 进口同比
- 出口目的地
- 进口来源地
- 出口商品类别
- 进口商品类别
- 第一大出口
- 第一大进口
schema_summary:
  time_frequency: monthly
  geo_levels_available:
  - national
  - region
  - province
  - city
  row_count: 5880
  data_range:
    start_year: 2016
    end_year: 2025
questions:
- id: 1
  category: A. 基础点查询
  sub_category: A1 单条件等值
  difficulty: easy
  question: 2024年1月全国层级的进出口贸易数据是多少？
  sql: "SELECT exports_musd, imports_musd, trade_balance_musd\nFROM trade_balance\nWHERE year = 2024 AND month = 1 AND geo_level = 'national'"
  columns_used:
  - year
  - month
  - geo_level
  - exports_musd
  - imports_musd
  - trade_balance_musd
  answer_type: list
  answer:
  - exports_musd: 326324.56
    imports_musd: 265438.55
    trade_balance_musd: 60886.01
  answer_unit: 百万美元
